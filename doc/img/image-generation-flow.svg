<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Noto Sans CJK JP', Meiryo, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    .t { font-size: 14px; font-weight: bold; fill: #0f172a; }
    .n { font-size: 13px; font-weight: bold; fill: #1e293b; }
    .p { font-size: 12px; font-weight: bold; fill: #1e293b; }
    .s { font-size: 11px; fill: #475569; }
    .edge { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="980" height="660" fill="#ffffff"/>

  <rect x="310" y="20" width="360" height="64" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="490" y="46" text-anchor="middle" class="n">create_image.py 起動</text>
  <text x="490" y="68" text-anchor="middle" class="s">設定ロード（YAML + JSON Schema 検証 → frozen dataclass）</text>

  <line x1="490" y1="84" x2="490" y2="116" class="edge"/>

  <!-- multiprocessing.Pool -->
  <rect x="25" y="116" width="930" height="230" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="490" y="142" text-anchor="middle" class="t">multiprocessing.Pool — 1 パネル 1 プロセスで並列描画（matplotlib のスレッド制約を回避）</text>

  <g>
    <rect x="40" y="160" width="120" height="150" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="100" y="185" text-anchor="middle" class="p">rain_cloud *</text>
    <text x="100" y="207" text-anchor="middle" class="s">雨雲レーダー</text>
    <text x="100" y="265" text-anchor="middle" class="s">気象庁</text>
    <text x="100" y="283" text-anchor="middle" class="s">（Selenium）</text>

    <rect x="171" y="160" width="120" height="150" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="231" y="185" text-anchor="middle" class="p">sensor</text>
    <text x="231" y="207" text-anchor="middle" class="s">センサーグラフ</text>
    <text x="231" y="265" text-anchor="middle" class="s">InfluxDB</text>

    <rect x="302" y="160" width="120" height="150" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="362" y="185" text-anchor="middle" class="p">power</text>
    <text x="362" y="207" text-anchor="middle" class="s">電力グラフ</text>
    <text x="362" y="265" text-anchor="middle" class="s">InfluxDB</text>

    <rect x="433" y="160" width="120" height="150" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="493" y="185" text-anchor="middle" class="p">weather *</text>
    <text x="493" y="207" text-anchor="middle" class="s">天気予報</text>
    <text x="493" y="265" text-anchor="middle" class="s">Yahoo! 天気</text>

    <rect x="564" y="160" width="120" height="150" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="624" y="185" text-anchor="middle" class="p">wbgt *</text>
    <text x="624" y="207" text-anchor="middle" class="s">暑さ指数</text>
    <text x="624" y="265" text-anchor="middle" class="s">環境省</text>

    <rect x="695" y="160" width="120" height="150" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="755" y="185" text-anchor="middle" class="p">rain_fall</text>
    <text x="755" y="207" text-anchor="middle" class="s">降水量</text>
    <text x="755" y="265" text-anchor="middle" class="s">InfluxDB</text>
    <text x="755" y="283" text-anchor="middle" class="s">（雨量計）</text>

    <rect x="826" y="160" width="120" height="150" rx="8" fill="#f3e8ff" stroke="#9333ea"/>
    <text x="886" y="185" text-anchor="middle" class="p">time *</text>
    <text x="886" y="207" text-anchor="middle" class="s">時刻表示</text>
    <text x="886" y="265" text-anchor="middle" class="s">システム時計</text>
  </g>

  <text x="490" y="334" text-anchor="middle" class="s">各パネルは (image, elapsed_time) または (image, elapsed_time, error_message) を返す</text>

  <text x="30" y="366" class="s">* は小型モードでも描画される 4 パネル</text>

  <line x1="490" y1="346" x2="490" y2="382" class="edge"/>

  <rect x="310" y="382" width="360" height="64" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="490" y="408" text-anchor="middle" class="n">結果収集</text>
  <text x="490" y="430" text-anchor="middle" class="s">パネルエラー時: Slack 通知 + 終了コード 220（MINOR）</text>

  <rect x="40" y="382" width="220" height="64" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="150" y="406" text-anchor="middle" class="n">メトリクス記録</text>
  <text x="150" y="426" text-anchor="middle" class="s">SQLite へパネル別処理時間・</text>
  <text x="150" y="440" text-anchor="middle" class="s">エラー状態を保存</text>
  <line x1="310" y1="414" x2="260" y2="414" class="edge"/>

  <rect x="720" y="376" width="235" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="5 4"/>
  <text x="837" y="400" text-anchor="middle" class="n">描画全体で例外発生時</text>
  <text x="837" y="420" text-anchor="middle" class="s">traceback 入りエラー画像を生成</text>
  <text x="837" y="438" text-anchor="middle" class="s">Slack 通知 + 終了コード 222（MAJOR）</text>
  <line x1="670" y1="414" x2="720" y2="414" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)"/>

  <line x1="490" y1="446" x2="490" y2="478" class="edge"/>

  <rect x="310" y="478" width="360" height="76" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="490" y="502" text-anchor="middle" class="n">画像合成</text>
  <text x="490" y="522" text-anchor="middle" class="s">壁紙 draw_wall → 各パネルを alpha_paste で貼り付け</text>
  <text x="490" y="540" text-anchor="middle" class="s">順序: power → weather → sensor → rain_cloud → wbgt → rain_fall → time</text>

  <line x1="490" y1="554" x2="490" y2="576" class="edge"/>

  <rect x="310" y="576" width="360" height="64" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="490" y="602" text-anchor="middle" class="n">出力</text>
  <text x="490" y="624" text-anchor="middle" class="s">グレースケール変換 → PNG を stdout / ファイルへ書き出し</text>
</svg>
