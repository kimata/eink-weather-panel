apiVersion: apps/v1
kind: Deployment
metadata:
    name: eink-weather-panel
    namespace: panel
    labels:
        app: eink-weather-panel
spec:
    replicas: 1
    selector:
        matchLabels:
            app: eink-weather-panel
    template:
        metadata:
            labels:
                app: eink-weather-panel
        spec:
            containers:
                - name: eink-weather-panel
                  image: gitlab.green-rabbit.net:5050/kimata/eink-weather-panel:latest
                  imagePullPolicy: Always
                  env:
                      - name: RASP_HOSTNAME
                        value: rasp-meter-1
                      - name: INFLUXDB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: influxdb-token
                                key: password
                  resources:
                      requests:
                          memory: 512Mi
                          ephemeral-storage: 256Mi
                      limits:
                          memory: 2Gi
                          ephemeral-storage: 1Gi
                  livenessProbe:
                      exec:
                          # NOTE: shebang のシステム python3 はイメージに存在しないため、
                          # uv 経由で venv の Python を使って実行する
                          command:
                              - uv
                              - run
                              - --no-group
                              - dev
                              - src/healthz.py
                      initialDelaySeconds: 120
                      periodSeconds: 60
                      # NOTE: 設定ファイルのロード (YAML + JSON Schema 検証) に数秒かかるため、
                      # 余裕を持たせる
                      timeoutSeconds: 30
                      successThreshold: 1
                      failureThreshold: 2
            dnsPolicy: Default
            affinity:
                nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                        nodeSelectorTerms:
                            - matchExpressions:
                                  - key: node-role.kubernetes.io/server
                                    operator: In
                                    values:
                                        - large
